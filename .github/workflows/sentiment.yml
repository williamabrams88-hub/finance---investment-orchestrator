name: Stock Sentiment Pipeline

on:
  schedule:
    - cron: '0 12 * * *'   # Full pipeline  — 07:00 EST (08:00 EDT)
    - cron: '0 16 * * *'   # Score-only     — 11:00 EST (12:00 EDT)
    - cron: '0 20 * * *'   # Score-only     — 15:00 EST (16:00 EDT)
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push DB back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: stock-sentiment/requirements.txt

      - name: Install dependencies
        run: pip install -r stock-sentiment/requirements.txt

      - name: Run pipeline
        working-directory: stock-sentiment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 12 * * *" ] || \
             [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python run.py --once
          else
            python run.py --score-only
          fi

      - name: Write job summary
        if: always()
        working-directory: stock-sentiment
        run: |
          echo "## Sentiment Run — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/scores.csv ]; then
            echo "### Latest Scores" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            head -6 reports/scores.csv >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f reports/daily_digest.csv ]; then
            SIGNAL_COUNT=$(tail -n +2 reports/daily_digest.csv | wc -l)
            echo "**Total signals logged:** $SIGNAL_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f reports/paper_pnl.csv ]; then
            OPEN=$(grep -c ",OPEN$" reports/paper_pnl.csv || true)
            echo "**Open paper trades:** $OPEN" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit updated DB and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-sentiment/sentiment.db stock-sentiment/reports/
          git diff --cached --quiet || \
            git commit -m "chore: update sentiment DB [skip ci]" && git push
